name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

jobs:
  build-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Cache Loom assets
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/fabric-loom
            ~/.gradle/caches/minecraft
          key: loom-${{ runner.os }}-${{ hashFiles('gradle.properties') }}
          restore-keys: loom-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build main
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s/^mod_version=.*/mod_version=${VERSION}/" gradle.properties
          ./gradlew build

      - name: Rename JARs (add -main suffix)
        run: |
          for f in build/libs/*.jar; do
            base=$(basename "$f" .jar)
            mv "$f" "build/libs/${base}-main.jar"
          done

      - name: Upload main artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-jars
          path: build/libs/*.jar

  build-sub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 26.2 branch
        uses: actions/checkout@v4
        with:
          ref: 26.2

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Cache Loom assets
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/fabric-loom
            ~/.gradle/caches/minecraft
          key: loom-${{ runner.os }}-${{ hashFiles('gradle.properties') }}
          restore-keys: loom-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build 26.2
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s/^mod_version=.*/mod_version=${VERSION}/" gradle.properties
          ./gradlew build

      - name: Rename JARs (add -26.2 suffix)
        run: |
          for f in build/libs/*.jar; do
            base=$(basename "$f" .jar)
            mv "$f" "build/libs/${base}-26.2.jar"
          done

      - name: Upload 26.2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub-jars
          path: build/libs/*.jar

  release:
    needs: [build-main, build-sub]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --sort newest --strip header --output changelog.md
          config: cliff.toml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: changelog.md
          files: artifacts/**/*
          generate_release_notes: false

      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE }}
          GITEE_OWNER: Bluesky-kk
          GITEE_REPO: BabyzombieAddons
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          BODY=$(cat changelog.md)
          API="https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO"
          TOKEN="access_token=$GITEE_TOKEN"
          RESP=$(curl -sS "$API/releases/tags/$TAG?$TOKEN")
          RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "在 Gitee 上创建 release: $TAG"
            PAYLOAD=$(jq -n --arg tag "$TAG" --arg name "Release $TAG" --arg body "$BODY" \
              '{tag_name: $tag, name: $name, body: $body}')
            RESP=$(curl -sS -w "\n%{http_code}" -X POST "$API/releases?$TOKEN" \
              -H "Content-Type: application/json" -d "$PAYLOAD")
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY_RESP=$(echo "$RESP" | sed '$d')
            echo "HTTP $HTTP_CODE: $BODY_RESP"
            RELEASE_ID=$(echo "$BODY_RESP" | jq -r '.id // empty')
            if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
              echo "::warning ::Gitee 创建 release 失败，跳过同步"
              exit 0
            fi
            echo "创建的 release ID: $RELEASE_ID"
          else
            echo "Gitee 上已存在 release，更新描述"
            PAYLOAD=$(jq -n --arg body "$BODY" '{body: $body}')
            curl -sS -X PATCH "$API/releases/$RELEASE_ID?$TOKEN" \
              -H "Content-Type: application/json" -d "$PAYLOAD" > /dev/null
          fi
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            for f in artifacts/*.jar; do
              echo "上传: $f"
              for i in 1 2 3 4; do
                RESP=$(curl -sS --retry 2 --connect-timeout 30 --max-time 120 \
                  -X POST "$API/releases/$RELEASE_ID/attach_files?$TOKEN" \
                  -F "file=@$f" 2>&1) && break
                sleep 5
              done
            done
          fi
          echo "Gitee 同步完成"
