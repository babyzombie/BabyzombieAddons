name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set release version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^mod_version=.*/mod_version=$VERSION/" gradle.properties

      - name: Build
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BabyzombieAddons-${{ github.ref_name }}
          path: build/libs/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --sort newest --strip header --output changelog.md
          config: cliff.toml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: changelog.md
          files: artifacts/**/*
          generate_release_notes: false

      - name: Sync GitHub Release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE }}
          GITEE_OWNER: Bluesky-kk
          GITEE_REPO: BabyzombieAddons
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          BODY=$(cat changelog.md)
          API="https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO"
          TOKEN="access_token=$GITEE_TOKEN"

          # 查 Gitee 上是否已有同名 tag 的 release
          RESP=$(curl -sS "$API/releases/tags/$TAG?$TOKEN")
          RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "在 Gitee 上创建 release: $TAG"
            PAYLOAD=$(jq -n --arg tag "$TAG" --arg name "Release $TAG" --arg body "$BODY" \
              '{tag_name: $tag, name: $name, body: $body, target_commitish: "main"}')
            RESP=$(curl -sS -X POST "$API/releases?$TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            RELEASE_ID=$(echo "$RESP" | jq -r '.id')
            echo "创建的 release ID: $RELEASE_ID"
          else
            echo "Gitee 上已存在 release (ID: $RELEASE_ID)，更新描述"
            PAYLOAD=$(jq -n --arg body "$BODY" '{body: $body}')
            curl -sS -X PATCH "$API/releases/$RELEASE_ID?$TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" > /dev/null
          fi

          # 上传 JAR 附件（最多重试 3 次）
          FAILED=0
          for f in artifacts/*.jar; do
            echo "上传: $f"
            UPLOAD_OK=0
            for i in 1 2 3 4; do
              echo "  第 $i 次尝试..."
              RESP=$(curl -sS --retry 2 --connect-timeout 30 --max-time 120 \
                -X POST "$API/releases/$RELEASE_ID/attach_files?$TOKEN" \
                -F "file=@$f" 2>&1) && UPLOAD_OK=1 && break
              echo "  失败，${i}/3 次"
              sleep 5
            done
            if [ "$UPLOAD_OK" -eq 1 ]; then
              echo "$RESP" | jq -r '.name + " -> " + (.browser_download_url // "失败")'
            else
              echo "::warning ::$f 上传最终失败"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error ::部分 JAR 上传 Gitee 失败"
            exit 1
          fi
          echo "Gitee release 同步完成"
