name: Sync main to version branches

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    strategy:
      matrix:
        target: [26.1.2, 26.2]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create sync PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SYNC_BRANCH="sync/main-to-${{ matrix.target }}-$(date +%Y%m%d%H%M%S)"

          git checkout -b "$SYNC_BRANCH" origin/${{ matrix.target }}
          git merge origin/main --no-commit --no-ff || true

          # Revert version-specific files to target branch versions
          for f in gradle.properties build.gradle src/main/resources/fabric.mod.json; do
            if [ -f "$f" ]; then
              git checkout origin/${{ matrix.target }} -- "$f"
            fi
          done

          git add -A
          git commit -m "sync: merge main into ${{ matrix.target }}" || exit 0

          git push origin "$SYNC_BRANCH"

          gh pr create \
            --base ${{ matrix.target }} \
            --head "$SYNC_BRANCH" \
            --title "sync: main → ${{ matrix.target }}" \
            --body "自动从 main 分支同步。版本配置文件（gradle.properties, build.gradle, fabric.mod.json）已保留 ${{ matrix.target }} 版本。"
        env:
          GH_TOKEN: ${{ github.token }}
