name: Build

on:
  push:
    branches: [main, 26.1.2, 26.2]
  pull_request:
    branches: [main, 26.1.2, 26.2]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BabyzombieAddons-${{ github.ref_name | replace('/', '-') }}
          path: build/libs/*.jar
