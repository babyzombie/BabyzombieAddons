name: Build

on:
  push:
    branches: [main, 26.1.2, 26.2]
  pull_request:
    branches: [main, 26.1.2, 26.2]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set dev version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "ARTIFACT_NAME=BabyzombieAddons-dev-$SHORT_SHA" >> $GITHUB_ENV
          echo "VERSION_PREFIX=dev-$SHORT_SHA" >> $GITHUB_ENV

      - name: Build
        run: ./gradlew build -Pversion_prefix="$VERSION_PREFIX"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build/libs/*.jar
